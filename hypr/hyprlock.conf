
background {
    monitor =
    # Matches the dark background of your Waybar
    color = rgba(30, 30, 46, 1.0) 
}

label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 100
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 150
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33 
    dots_spacing = 0.15 
    dots_center = true
    outer_color = rgb(137, 180, 250)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    placeholder_text = <i>Enter Password...</i> 
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}
