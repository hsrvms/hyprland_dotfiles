
# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
# bind=Alt,space,spawn,rofi -show drun
# bind=Alt,Return,spawn,foot

# exit
#bind=SUPER+ALT,m,quit
bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=ALT,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=ALT+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER+ALT,n,switch_layout

# tag switch
# bind=SUPER,Left,viewtoleft,0
# bind=CTRL,Left,viewtoleft_have_client,0
# bind=SUPER,Right,viewtoright,0
# bind=CTRL,Right,viewtoright_have_client,0
# bind=CTRL+SUPER,Left,tagtoleft,0
# bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+ALT,k,movewin,+0,-50
bind=CTRL+ALT,j,movewin,+0,+50
bind=CTRL+ALT,h,movewin,-50,+0
bind=CTRL+ALT,l,movewin,+50,+0

# resizewin
bind=CTRL+SHIFT,k,resizewin,+0,-50
bind=CTRL+SHIFT,j,resizewin,+0,+50
bind=CTRL+SHIFT,h,resizewin,-50,+0
bind=CTRL+SHIFT,l,resizewin,+50,+0

bind=SUPER,s,spawn,qs -c noctalia-shell ipc call controlCenter toggle
bind=SUPER,comma,spawn,qs -c noctalia-shell ipc call settings toggle
bind=SUPER,space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=SUPER,v,spawn,qs -c noctalia-shell ipc call launcher clipboard
bind=SUPER+CTRL,e,spawn,qs -c noctalia-shell ipc call launcher emoji
bind=SUPER+SHIFT,c,spawn,qs -c noctalia-shell ipc call launcher command
#bind=SUPER+ALT,l,spawn,qs -c noctalia-shell ipc call lockScreen lock
bind=SUPER+ALT,l,spawn,qs -c noctalia-shell ipc call sessionMenu lockAndSuspend
bind=SUPER+SHIFT,m,spawn,qs -c noctalia-shell ipc call systemMonitor toggle
bind=SUPER+SHIFT,n,spawn,qs -c noctalia-shell ipc call notifications toggleHistory
bind=SUPER,b,spawn,qs -c noctalia-shell ipc call bar peek
bind=SUPER+SHIFT,b,spawn,qs -c noctalia-shell ipc call bar toggle

# Media keys
bind=NONE,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call volume increase
bind=NONE,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bind=NONE,XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput
bind=NONE,XF86MonBrightnessUp,spawn,qs -c noctalia-shell ipc call brightness increase
bind=NONE,XF86MonBrightnessDown,spawn,qs -c noctalia-shell ipc call brightness decrease
bind=NONE,XF86AudioMicMute,spawn,qs -c noctalia-shell ipc call volume muteInput



bind=SUPER,e,spawn,thunar
bind=SUPER,Return,spawn,foot
bind=SUPER+SHIFT,e,spawn,foot -e yazi

bind=SUPER+SHIFT,s,spawn,~/.config/mango/scripts/screenshot.sh
bind=SUPER,t,spawn,~/.config/mango/scripts/togglefloat.sh
#bind=SUPER,t,togglefloating,




# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
